<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lista de compras</title>
<!-- ícono al 'Agregar a inicio' en iOS (el logo de Carrefour, subido al repo). -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Carrefour">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#254F9A">
<style>
  /* mismos tokens que la app de escritorio, para que se sienta el mismo sistema */
  :root {
    --bg: #eef0f4; --card: #ffffff; --fill: #eff1f5;
    --text: #15171c; --muted: #767b85; --line: #e6e8ee;
    --accent: #2f6bf0; --accent-soft: #e9f0ff;
    --green: #15803d; --green-soft: #daf4e4;
    --shadow: 0 1px 2px rgba(18, 22, 31, .03), 0 4px 16px rgba(18, 22, 31, .055);
    --radius: 24px; --radius-sm: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, system-ui, sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%;
    padding: 0 0 44px;
  }
  header {
    position: sticky; top: 0; z-index: 5; background: var(--bg);
    padding: max(20px, env(safe-area-inset-top)) 18px 14px;
  }
  h1 { margin: 0; font-size: 26px; font-weight: 680; letter-spacing: -.02em; }
  .sub { margin: 3px 0 0; color: var(--muted); font-size: 14.5px; }
  .barTxt { display: flex; justify-content: space-between; align-items: baseline; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .barTxt b { color: var(--text); font-weight: 680; }
  .barTxt .amt { font-size: 15px; }

  /* 2 productos por fila */
  ul { list-style: none; margin: 4px 0 0; padding: 0 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  /* el checkbox real se oculta; la tarjeta (label) es lo que se toca */
  .chk { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
  .card {
    position: relative; display: block; cursor: pointer;
    background: var(--card); border-radius: var(--radius-sm);
    box-shadow: var(--shadow); overflow: hidden;
    -webkit-user-select: none; user-select: none; transition: opacity .15s; height: 100%;
  }
  /* IMAGEN protagonista: bloque grande arriba, como el catálogo de escritorio */
  .pic {
    display: grid; place-items: center; background: #fff;
    aspect-ratio: 1 / 1; padding: 14px;
  }
  .pic img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .pic.empty { background: var(--fill); color: var(--muted); font-size: 12px; }
  .card-body { display: block; padding: 12px 14px 15px; }
  .name { display: block; font-size: 13.5px; font-weight: 550; line-height: 1.3; }
  .price { display: block; font-size: 18px; font-weight: 680; letter-spacing: -.01em; margin-top: 6px; }
  .price .ppu { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 2px; letter-spacing: 0; }
  /* círculo de tildado, arriba a la derecha sobre la imagen */
  .check {
    position: absolute; top: 10px; right: 10px; width: 32px; height: 32px;
    border-radius: 999px; background: rgba(255, 255, 255, .92); border: 1.5px solid var(--line);
    display: grid; place-items: center; box-shadow: var(--shadow);
    transition: background .12s, border-color .12s;
  }
  .check::after { content: "\2713"; color: #fff; font-size: 17px; font-weight: 700; opacity: 0; }
  /* estado TILDADO, en CSS puro: checkbox marcado -> su tarjeta hermana cambia */
  .chk:checked + .card { opacity: .5; }
  .chk:checked + .card .name { text-decoration: line-through; }
  .chk:checked + .card .check { background: var(--green); border-color: var(--green); }
  .chk:checked + .card .check::after { opacity: 1; }
  .foot { text-align: center; color: var(--muted); font-size: 12.5px; margin: 26px 20px 0; }

  /* ---- Alternativas: para cuando el producto no está en la góndola ---- */
  /* el <li> apila tarjeta + disparador; la tarjeta estira para que las dos
     columnas queden parejas aunque los nombres tengan distinto largo */
  .item { display: flex; flex-direction: column; }
  .item > .card { flex: 1; }
  .alt-chk { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
  .alt-open {
    display: block; margin-top: 6px; padding: 7px 10px; cursor: pointer;
    text-align: center; font-size: 12px; font-weight: 550; color: var(--muted);
    background: var(--card); border-radius: 999px; box-shadow: var(--shadow);
    -webkit-user-select: none; user-select: none;
  }
  .alt-open::before { content: "⇄ "; }
  /* el panel arranca oculto y lo destapa el checkbox: CSS puro, sin JS */
  .alt-sheet { display: none; }
  .alt-chk:checked ~ .alt-sheet { display: block; }
  .alt-back {
    position: fixed; inset: 0; z-index: 40; background: rgba(18, 22, 31, .45);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  /* sube desde abajo: es donde llega el pulgar con el changuito en la otra mano */
  .alt-panel {
    position: fixed; z-index: 41; left: 0; right: 0; bottom: 0;
    max-height: 82vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: var(--bg); border-radius: var(--radius) var(--radius) 0 0;
    padding: 6px 16px calc(20px + env(safe-area-inset-bottom));
    animation: alt-up .22s cubic-bezier(.32, .72, 0, 1);
  }
  @keyframes alt-up { from { transform: translateY(100%); } }
  /* la manija de arriba, puramente indicativa de que esto se cierra tirando */
  .alt-panel::before {
    content: ""; display: block; width: 38px; height: 4px; margin: 8px auto 12px;
    border-radius: 999px; background: var(--line);
  }
  .alt-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .alt-head h2 { margin: 0; font-size: 18px; font-weight: 680; letter-spacing: -.01em; }
  .alt-x {
    flex: none; width: 30px; height: 30px; border-radius: 999px; cursor: pointer;
    display: grid; place-items: center; font-size: 20px; line-height: 1;
    color: var(--muted); background: var(--fill);
  }
  .alt-sub { margin: 4px 0 12px; color: var(--muted); font-size: 13px; }
  .alt-list { display: block; margin: 0; padding: 0; list-style: none; }
  .alt-row {
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    background: var(--card); border-radius: var(--radius-sm); box-shadow: var(--shadow);
    padding: 10px 14px 10px 10px; margin-bottom: 8px;
  }
  .alt-row:active { background: var(--accent-soft); }
  .alt-pic {
    flex: none; width: 52px; height: 52px; border-radius: 10px; background: #fff;
    display: grid; place-items: center; overflow: hidden;
  }
  .alt-pic img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .alt-pic.empty { background: var(--fill); }
  .alt-info { flex: 1; min-width: 0; }
  .alt-marca { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .alt-marca:empty { display: none; }
  .alt-nombre { display: block; font-size: 13.5px; font-weight: 550; line-height: 1.3; }
  .alt-precios { flex: none; text-align: right; }
  .alt-precio { display: block; font-size: 16px; font-weight: 680; letter-spacing: -.01em; }
  .alt-ppu { display: block; font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  @media (prefers-reduced-motion: reduce) { .alt-panel { animation: none; } }
</style>
</head>

<p class="foot">Tocá cada producto cuando lo agarres.</p>
<script>
  // EXTRA opcional (solo si el visor ejecuta JS, ej. Safari): guarda el progreso
  // entre aperturas y actualiza el contador de arriba. Si no corre (Quick Look de
  // Files), no importa: las casillas de CSS igual se pueden tildar.
  (function () {
    var chks = [].slice.call(document.querySelectorAll('.chk'));
    var KEY = 'lista_compras_' + chks.length;
    var estado = {};
    try { estado = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { estado = {}; }
    function actualizar() {
      var hechos = chks.filter(function (c) { return c.checked; }).length;
      var el = document.getElementById('hechos');
      if (el) el.textContent = hechos;
    }
    chks.forEach(function (c, i) {
      if (estado[i]) c.checked = true;
      c.addEventListener('change', function () {
        estado[i] = c.checked;
        try { localStorage.setItem(KEY, JSON.stringify(estado)); } catch (e) {}
        actualizar();
      });
    });
    actualizar();

    // ---- Elegir una alternativa (mejora progresiva) ----
    // El panel abre y se lee sin JS. Esto agrega poder TOCAR una opción para que
    // reemplace a la de la tarjeta, que es lo que necesitás cuando el producto
    // que elegiste no está en la góndola.
    var items = [].slice.call(document.querySelectorAll('.item'));
    var KEY_ALT = KEY + '_alt';
    var swaps = {};
    try { swaps = JSON.parse(localStorage.getItem(KEY_ALT)) || {}; } catch (e) { swaps = {}; }

    // Mismo formato que _money_ar del backend: dos decimales, salvo que sean
    // ,00. Si no coincidiera, al recalcular el total cambiaría de pinta ($7.642,1
    // en vez de $7.642,10) y se notaría al tocar una alternativa.
    function money(n) {
      var s = n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (s.slice(-3) === ',00') s = s.slice(0, -3);
      return '$' + s;
    }

    // El intercambio es simétrico: la alternativa sube a la tarjeta y la que
    // estaba baja a la fila, conservando su lugar en el orden. Así siempre podés
    // volver atrás, y el orden de las opciones no se altera.
    function leerTarjeta(li) {
      var img = li.querySelector('.card .pic img');
      return {
        img: img ? img.getAttribute('src') : '',
        nombre: li.querySelector('.card .name').textContent,
        precio: parseFloat(li.getAttribute('data-precio')) || 0,
        marca: li.getAttribute('data-marca') || '',
        ppu: li.hasAttribute('data-ppu') ? parseFloat(li.getAttribute('data-ppu')) : null,
        unidad: li.getAttribute('data-unidad') || ''
      };
    }
    function leerFila(row) {
      var img = row.querySelector('.alt-pic img');
      var ppu = row.querySelector('.alt-ppu');
      return {
        img: img ? img.getAttribute('src') : '',
        nombre: row.querySelector('.alt-nombre').textContent,
        precio: parseFloat(row.getAttribute('data-precio')) || 0,
        marca: row.querySelector('.alt-marca').textContent,
        ppu: ppu ? parseFloat(ppu.getAttribute('data-v')) : null,
        unidad: ppu ? (ppu.getAttribute('data-u') || '') : ''
      };
    }
    function pintarTarjeta(li, p) {
      var qty = parseInt(li.getAttribute('data-qty'), 10) || 1;
      var pic = li.querySelector('.card .pic');
      if (p.img) {
        pic.className = 'pic';
        pic.innerHTML = '<img alt="">';
        pic.firstChild.setAttribute('src', p.img);
      } else {
        pic.className = 'pic empty';
        pic.textContent = 'sin imagen';
      }
      li.querySelector('.card .name').textContent = p.nombre;
      var precio = li.querySelector('.card .price');
      precio.textContent = money(p.precio);
      if (qty > 1) {
        var extra = document.createElement('span');
        extra.className = 'ppu';
        extra.textContent = 'x' + qty + ' \u00b7 ' + money(p.precio) + ' c/u';
        precio.appendChild(extra);
      }
      li.setAttribute('data-precio', p.precio);
      li.setAttribute('data-marca', p.marca);
      li.setAttribute('data-unidad', p.unidad);
      if (p.ppu == null) li.removeAttribute('data-ppu');
      else li.setAttribute('data-ppu', p.ppu);
    }
    function pintarFila(row, p) {
      var pic = row.querySelector('.alt-pic');
      if (p.img) {
        pic.className = 'alt-pic';
        pic.innerHTML = '<img alt="">';
        pic.firstChild.setAttribute('src', p.img);
      } else {
        pic.className = 'alt-pic empty';
        pic.innerHTML = '';
      }
      row.querySelector('.alt-nombre').textContent = p.nombre;
      row.querySelector('.alt-marca').textContent = p.marca;
      row.querySelector('.alt-precio').textContent = money(p.precio);
      row.setAttribute('data-precio', p.precio);
      var ppu = row.querySelector('.alt-ppu');
      if (p.ppu == null) { if (ppu) ppu.remove(); }
      else {
        if (!ppu) {
          ppu = document.createElement('span');
          ppu.className = 'alt-ppu';
          row.querySelector('.alt-precios').appendChild(ppu);
        }
        ppu.setAttribute('data-v', p.ppu);
        ppu.setAttribute('data-u', p.unidad);
        ppu.textContent = money(p.ppu) + ' / ' + (p.unidad || 'kg');
      }
    }
    function intercambiar(li, row) {
      var enTarjeta = leerTarjeta(li), enFila = leerFila(row);
      pintarTarjeta(li, enFila);
      pintarFila(row, enTarjeta);
    }

    function recalcularTotal() {
      var t = 0;
      items.forEach(function (li) {
        t += (parseFloat(li.getAttribute('data-precio')) || 0) * (parseInt(li.getAttribute('data-qty'), 10) || 1);
      });
      var el = document.getElementById('total');
      if (el) el.textContent = money(t);
    }

    items.forEach(function (li, i) {
      var filas = [].slice.call(li.querySelectorAll('.alt-row'));
      if (!filas.length) return;
      // recién ahora que sabemos que el JS corre, prometemos que se puede elegir
      var sub = li.querySelector('.alt-sub');
      if (sub) sub.textContent += ' Tocá una para reemplazar.';
      // Al recargar rehacemos los intercambios en el mismo orden en que los
      // hiciste: como el intercambio es simétrico y el HTML de origen es
      // siempre el mismo, repetir la secuencia reconstruye el estado exacto.
      (swaps[i] || []).forEach(function (j) {
        if (filas[j]) intercambiar(li, filas[j]);
      });
      filas.forEach(function (row, j) {
        row.addEventListener('click', function () {
          intercambiar(li, row);
          swaps[i] = (swaps[i] || []).concat([j]);
          try { localStorage.setItem(KEY_ALT, JSON.stringify(swaps)); } catch (e) {}
          recalcularTotal();
          var chk = li.querySelector('.alt-chk');
          if (chk) chk.checked = false;   // cerramos el panel
        });
      });
    });
    recalcularTotal();
  })();
</script>
